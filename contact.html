<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Ladder Analyst</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans leading-relaxed transition-colors duration-300">
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 py-3">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-2 font-bold text-blue-600 dark:text-blue-400">
        <span class="uppercase tracking-tighter">Ladder Analyst</span>
      </a>
      <div class="flex items-center gap-6">
        <a href="index.html" class="text-sm font-medium hover:text-blue-600 transition-colors">Home</a>
        <a href="about.html" class="text-sm font-medium hover:text-blue-600 transition-colors">About</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-20">
    <header class="mb-16 text-center">
      <h1 class="text-4xl font-extrabold mb-6 bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-400 bg-clip-text text-transparent">
        문의하기
      </h1>
      <p class="text-xl text-slate-600 dark:text-slate-400">
        기술 지원, 제휴 제안 또는 피드백이 있으시면 언제든 연락주세요.
      </p>
    </header>

    <section class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800">
      <form action="https://formspree.io/f/maqdkyel" method="POST" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">성함 / 기업명</label>
              <input type="text" name="name" required placeholder="Name / Company" 
                class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">이메일 주소</label>
              <input type="email" name="email" required placeholder="email@example.com" 
                class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">문의 유형</label>
            <select name="type" class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none appearance-none cursor-pointer">
              <option value="tech">기술 지원</option>
              <option value="partnership">제휴 제안</option>
              <option value="feedback">피드백</option>
              <option value="other">기타</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">문의 내용</label>
            <textarea name="message" required rows="6" placeholder="Your Message" 
              class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none resize-none"></textarea>
          </div>
          <div class="flex justify-center">
            <button type="submit" class="w-full md:w-auto px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all shadow-lg active:scale-95">
              <span>문의 보내기</span>
              <i class="fas fa-paper-plane ml-2"></i>
            </button>
          </div>
        </form>
    </section>
  </main>

  <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-500">
    <p class="text-sm">© 2026 Ladder Analyst. All rights reserved.</p>
  </footer>
</body>
</html>
